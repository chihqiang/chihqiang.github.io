<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>clone github代码出现Operation timed out解决 xianxin 志强网</title><meta name="keywords" content="git,time" out><meta name="description" content="志强博客"><link rel="shortcut icon" type="image/x-icon" href="/img/favicon.ico"><link rel="stylesheet" href="/css/blog.css"><link rel="stylesheet" href="/libs/layui/css/layui.css"><script src="/libs/layui/layui.js"></script><script src="/js/blog.js"></script><meta name="generator" content="Hexo 7.3.0"></head><body class="lay-blog"><div class="header"><div class="header-wrap"><h1 class="logo pull-left"><a href="/"><img src="/img/logo.png" alt="" class="logo-img"> <img src="/img/logo-text.png" alt="" class="logo-text"></a></h1><style>#search-results{position:absolute;top:50px;left:0;width:100%;max-height:400px;overflow-y:auto;z-index:999;padding:10px}.search-result-item{background:#fff;border-radius:8px;padding:12px 16px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.08);transition:.2s ease;border:1px solid #eee}.search-result-item:hover{background-color:#f8f8f8;transform:translateY(-2px)}.search-result-title{font-size:16px;font-weight:600;color:#0078f2;text-decoration:none;display:block;line-height:1.5}.search-no-result{padding:16px;color:#999;font-style:italic}</style><div class="layui-form blog-seach pull-left" style="position:relative"><div class="layui-form-item blog-sewrap"><div class="layui-input-block blog-sebox"><i class="layui-icon layui-icon-search"></i> <input type="text" id="search-input" placeholder="请输入关键词" autocomplete="off" class="layui-input"><div id="search-results"></div></div></div></div><script>(() => {
    const input = document.getElementById('search-input');
    const resultBox = document.getElementById('search-results');
    let searchData = [];

    fetch('/search.json')
      .then(res => res.json())
      .then(data => searchData = data)
      .catch(err => console.error('加载 search.json 失败', err));

    input.addEventListener('input', () => {
      const keyword = input.value.trim().toLowerCase();
      resultBox.innerHTML = '';

      if (!keyword) return;

      const results = searchData.filter(post =>
        post.title.toLowerCase().includes(keyword)
      );

      if (results.length === 0) {
        resultBox.innerHTML = '<div class="search-no-result">没有找到相关文章</div>';
        return;
      }

      results.slice(0, 10).forEach(post => {
        const item = document.createElement('div');
        item.className = 'search-result-item';
        item.innerHTML = `
          <a href="${post.url}" class="search-result-title">${post.title}</a>
        `;
        resultBox.appendChild(item);
      });
    });

    // 点击页面其他地方关闭结果
    document.addEventListener('click', (e) => {
      if (!document.querySelector('.blog-seach').contains(e.target)) {
        resultBox.innerHTML = '';
      }
    });
  })();</script><div class="blog-nav pull-right"><ul class="layui-nav pull-left"><li class="layui-nav-item"><a href="/">Home</a></li><li class="layui-nav-item"><a href="/about">About</a></li><li class="layui-nav-item"><a href="/archives">Archives</a></li><li class="layui-nav-item"><a href="/tags">Tags</a></li><li class="layui-nav-item"><a href="/sitemap.xml">RSS</a></li></ul></div></div></div><div class="container-wrap"><div class="container"><div class="contar-wrap"><div class="item"><div class="item-box"><p class="layui-breadcrumb" style="visibility:inherit"><a href="/">首页 </a><a href="/categories/git/">git</a></p><h3>clone github代码出现Operation timed out解决</h3><h5>发布于：<span> 2024-04-21</span></h5><div class="post-meta"><a href="/tags/git/"><button type="button" class="layui-btn layui-btn-sm layui-bg-orange">#git</button> </a><a href="/tags/time-out/"><button type="button" class="layui-btn layui-btn-sm layui-bg-orange">#time out</button></a></div><hr class="layui-border-orange"><div class="layui-content"><p class="lay-content page-content"></p><figure class="highlight text"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">➜  ~ git clone git@github.com:pkg6/go-requests.git</span><br><span class="line">Cloning into &#x27;go-requests&#x27;...</span><br><span class="line">ssh: connect to host github.com port 22: Operation timed out</span><br><span class="line">fatal: Could not read from remote repository.</span><br><span class="line"></span><br><span class="line">Please make sure you have the correct access rights</span><br><span class="line">and the repository exists.</span><br></pre></td></tr></table></figure><p>首先要确定你的ssh证书书否正确，如果正确还是出现上面问题可以按照下面的流程进行解决</p><figure class="highlight text"><table><tr><td class="gutter">
