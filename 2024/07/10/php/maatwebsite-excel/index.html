<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>使用`maatwebsite/excel`进行表格操作 xianxin 志强网</title><meta name="keywords" content="excel"><meta name="description" content="志强博客"><link rel="shortcut icon" type="image/x-icon" href="/img/favicon.ico"><link rel="stylesheet" href="/css/blog.css"><link rel="stylesheet" href="/libs/layui/css/layui.css"><script src="/libs/layui/layui.js"></script><script src="/js/blog.js"></script><meta name="generator" content="Hexo 7.3.0"></head><body class="lay-blog"><div class="header"><div class="header-wrap"><h1 class="logo pull-left"><a href="/"><img src="/img/logo.png" alt="" class="logo-img"> <img src="/img/logo-text.png" alt="" class="logo-text"></a></h1><style>#search-results{position:absolute;top:50px;left:0;width:100%;max-height:400px;overflow-y:auto;z-index:999;padding:10px}.search-result-item{background:#fff;border-radius:8px;padding:12px 16px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.08);transition:.2s ease;border:1px solid #eee}.search-result-item:hover{background-color:#f8f8f8;transform:translateY(-2px)}.search-result-title{font-size:16px;font-weight:600;color:#0078f2;text-decoration:none;display:block;line-height:1.5}.search-no-result{padding:16px;color:#999;font-style:italic}</style><div class="layui-form blog-seach pull-left" style="position:relative"><div class="layui-form-item blog-sewrap"><div class="layui-input-block blog-sebox"><i class="layui-icon layui-icon-search"></i> <input type="text" id="search-input" placeholder="请输入关键词" autocomplete="off" class="layui-input"><div id="search-results"></div></div></div></div><script>(() => {
    const input = document.getElementById('search-input');
    const resultBox = document.getElementById('search-results');
    let searchData = [];

    fetch('/search.json')
      .then(res => res.json())
      .then(data => searchData = data)
      .catch(err => console.error('加载 search.json 失败', err));

    input.addEventListener('input', () => {
      const keyword = input.value.trim().toLowerCase();
      resultBox.innerHTML = '';

      if (!keyword) return;

      const results = searchData.filter(post =>
        post.title.toLowerCase().includes(keyword)
      );

      if (results.length === 0) {
        resultBox.innerHTML = '<div class="search-no-result">没有找到相关文章</div>';
        return;
      }

      results.slice(0, 10).forEach(post => {
        const item = document.createElement('div');
        item.className = 'search-result-item';
        item.innerHTML = `
          <a href="${post.url}" class="search-result-title">${post.title}</a>
        `;
        resultBox.appendChild(item);
      });
    });

    // 点击页面其他地方关闭结果
    document.addEventListener('click', (e) => {
      if (!document.querySelector('.blog-seach').contains(e.target)) {
        resultBox.innerHTML = '';
      }
    });
  })();</script><div class="blog-nav pull-right"><ul class="layui-nav pull-left"><li class="layui-nav-item"><a href="/">Home</a></li><li class="layui-nav-item"><a href="/about">About</a></li><li class="layui-nav-item"><a href="/archives">Archives</a></li><li class="layui-nav-item"><a href="/tags">Tags</a></li><li class="layui-nav-item"><a href="/sitemap.xml">RSS</a></li></ul></div></div></div><div class="container-wrap"><div class="container"><div class="contar-wrap"><div class="item"><div class="item-box"><p class="layui-breadcrumb" style="visibility:inherit"><a href="/">首页 </a><a href="/categories/php/">php</a></p><h3>使用`maatwebsite/excel`进行表格操作</h3><h5>发布于：<span> 2024-07-10</span></h5><div class="post-meta"><a href="/tags/excel/"><button type="button" class="layui-btn layui-btn-sm layui-bg-orange">#excel</button></a></div><hr class="layui-border-orange"><div class="layui-content"><p class="lay-content page-content"></p><h1 id="安装"><a href="#安装" class="headerlink" title="安装"></a>安装</h1><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">composer require maatwebsite/excel ^3.1</span><br></pre></td></tr></table></figure><h1 id="导出"><a href="#导出" class="headerlink" title="导出"></a>导出</h1><ol><li>定义导出类</li></ol><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br></pre></td><td class="code"><pre><span class="line">use App\Exports\Sheets\TeamRegistration\Enterprise;</span><br><span class="line">use App\Exports\Sheets\TeamRegistration\School;</span><br><span class="line">use Maatwebsite\Excel\Concerns\Exportable;</span><br><span class="line">use Maatwebsite\Excel\Concerns\WithMultipleSheets;</span><br><span class="line"></span><br><span class="line">class TestSheets implements WithMultipleSheets</span><br><span class="line">&#123;</span><br><span class="line">    use Exportable;</span><br><span class="line"></span><br><span class="line">    public function sheets(): array</span><br><span class="line">    &#123;</span><br><span class="line">        $sheets = [];</span><br><span class="line">        //Sheet1</span><br><span class="line">        $sheets[] = new Sheet1();</span><br><span class="line">        //Sheet2</span><br><span class="line">				//$sheets[] = new Sheet1();</span><br><span class="line">        return $sheets;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure><ol start="2"><li>定义第1个sheets</li></ol><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br></pre></td><td class="code"><pre><span class="line">use Maatwebsite\Excel\Concerns\FromArray;</span><br><span class="line">use Maatwebsite\Excel\Concerns\WithHeadings;</span><br><span class="line">use Maatwebsite\Excel\Concerns\WithTitle;</span><br><span class="line"></span><br><span class="line">class Sheet1 implements FromArray, WithHeadings, WithTitle</span><br><span class="line">&#123;</span><br><span class="line">    public function array(): array</span><br><span class="line">    &#123;</span><br><span class="line">        $list[0][&#x27;h1&#x27;] = &#x27;h11&#x27;;</span><br><span class="line">        $list[0][&#x27;h2&#x27;] = &#x27;h22&#x27;;</span><br><span class="line">        $list[0][&#x27;h3&#x27;] = &#x27;h33&#x27;;</span><br><span class="line">        return  $list;</span><br><span class="line">    &#125;</span><br><span class="line">    public function headings(): array</span><br><span class="line">    &#123;</span><br><span class="line">        return  [&quot;h1&quot;,&quot;h2&quot;,&quot;h3&quot;];</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    public function title(): string</span><br><span class="line">    &#123;</span><br><span class="line">        return &quot;sheet1&quot;;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure><ol start="3"><li>使用</li></ol><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">return (new TestSheets())-&gt;download(&quot;test-name.xlsx&quot;);</span><br></pre></td></tr></table></figure><p></p></div><hr class="layui-border-orange"></div></div><style>.layui-content table{border-collapse:collapse;border-spacing:0;margin:10px 0;display:table}.layui-content table td,table th{padding:10px;border:1px solid #ddd;color:#333;vertical-align:middle;word-break:normal!important}.layui-content table .gutter{display:none}.layui-content figure.highlight{margin:15px 0;backgrou
