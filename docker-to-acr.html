<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>志强网</title><meta name="keywords" content="草根创业者,个人站长,站长动态,王志强,志强博客,志强网"><meta name="description" content="志强博客"><link rel="shortcut icon" type="image/x-icon" href="/img/favicon.ico"><link rel="stylesheet" href="/css/blog.css"><link rel="stylesheet" href="/libs/layui/css/layui.css"><script src="/libs/layui/layui.js"></script><script src="/js/blog.js"></script><meta name="generator" content="Hexo 7.3.0"></head><body class="lay-blog"><div class="header"><div class="header-wrap"><h1 class="logo pull-left"><a href="/"><img src="/img/logo.png" alt="" class="logo-img"> <img src="/img/logo-text.png" alt="" class="logo-text"></a></h1><style>#search-results{position:absolute;top:50px;left:0;width:100%;max-height:400px;overflow-y:auto;z-index:999;padding:10px}.search-result-item{background:#fff;border-radius:8px;padding:12px 16px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.08);transition:.2s ease;border:1px solid #eee}.search-result-item:hover{background-color:#f8f8f8;transform:translateY(-2px)}.search-result-title{font-size:16px;font-weight:600;color:#0078f2;text-decoration:none;display:block;line-height:1.5}.search-no-result{padding:16px;color:#999;font-style:italic}</style><div class="layui-form blog-seach pull-left" style="position:relative"><div class="layui-form-item blog-sewrap"><div class="layui-input-block blog-sebox"><i class="layui-icon layui-icon-search"></i> <input type="text" id="search-input" placeholder="请输入关键词" autocomplete="off" class="layui-input"><div id="search-results"></div></div></div></div><script>(() => {
    const input = document.getElementById('search-input');
    const resultBox = document.getElementById('search-results');
    let searchData = [];

    fetch('/search.json')
      .then(res => res.json())
      .then(data => searchData = data)
      .catch(err => console.error('加载 search.json 失败', err));

    input.addEventListener('input', () => {
      const keyword = input.value.trim().toLowerCase();
      resultBox.innerHTML = '';

      if (!keyword) return;

      const results = searchData.filter(post =>
        post.title.toLowerCase().includes(keyword)
      );

      if (results.length === 0) {
        resultBox.innerHTML = '<div class="search-no-result">没有找到相关文章</div>';
        return;
      }

      results.slice(0, 10).forEach(post => {
        const item = document.createElement('div');
        item.className = 'search-result-item';
        item.innerHTML = `
          <a href="${post.url}" class="search-result-title">${post.title}</a>
        `;
        resultBox.appendChild(item);
      });
    });

    // 点击页面其他地方关闭结果
    document.addEventListener('click', (e) => {
      if (!document.querySelector('.blog-seach').contains(e.target)) {
        resultBox.innerHTML = '';
      }
    });
  })();</script><div class="blog-nav pull-right"><ul class="layui-nav pull-left"><li class="layui-nav-item"><a href="/">Home</a></li><li class="layui-nav-item"><a href="/about">About</a></li><li class="layui-nav-item"><a href="/archives">Archives</a></li><li class="layui-nav-item"><a href="/tags">Tags</a></li><li class="layui-nav-item"><a href="/sitemap.xml">RSS</a></li></ul></div></div></div><div class="container-wrap"><div class="container"><div class="contar-wrap"><div class="item"><div class="item-box"><div class="layui-content"><p class="lay-content"><!DOCTYPE html></p><html lang="zh-CN"><head><meta charset="UTF-8"><title>从 docker 迁移到 阿里云ACR</title><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/vue@3/dist/vue.global.js"></script></head><body class="bg-gradient-to-br from-orange-100 to-orange-300 min-h-screen flex items-center justify-center p-4"><div id="app" class="bg-white rounded-2xl shadow-xl p-8 max-w-2xl w-full space-y-8"><div><h2 class="text-2xl font-bold text-gray-800 mb-2">原始镜像地址</h2><input v-model.trim="fullImage" placeholder="例如：docker.io/library/nginx:1.25" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-gray-700 placeholder-gray-400 focus:ring-2 focus:ring-orange-400 focus:outline-none"></div><div><h2 class="text-2xl font-bold text-gray-800 mb-2">目标镜像地址（ACR）</h2><div class="relative"><input :value="toImage" readonly @click="copy(toImage)" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-gray-700 cursor-pointer focus:outline-none focus:ring-2 focus:ring-green-400"> <span v-if="copied" class="absolute right-3 top-3 text-green-500 text-sm">✅ 已复制</span></div><p class="mt-2 text-sm text-yellow-600">提示：您要拉取的镜像可能尚未同步到 ACR。</p></div></div><script>const { createApp, ref, computed } = Vue;

        // 预定义“软镜像”列表
        const soft_images = ['spug', 'maxwell'];

        createApp({
            setup() {
                const fullImage = ref('');
                const copied = ref(false);

                // 固定不变的 ACR registry
                const CONTAINER_REGISTRY = 'registry.cn-hangzhou.aliyuncs.com';

                // 根据 fullImage 自动计算目标地址
                const toImage = computed(() => {
                    const val = fullImage.value.trim();
                    if (!val.includes(':')) {
                        return '';
                    }
                    // 拆分出 path 和 tag
                    const [imagePath, tag] = val.split(':', 2);
                    const imageBase = imagePath.split('/').pop();

                    // 根据 imageBase 是否在 soft_images 里，选择不同的仓库路径
                    let containerName;
                    if (soft_images.includes(imageBase)) {
                        containerName = 'buildx/soft';
                    } else {
                        containerName = 'buildx/hub';
                    }

                    // 按规则拼接
                    if (tag === 'latest') {
                        return `${CONTAINER_REGISTRY}/${containerName}:${imageBase}`;
                    } else {
                        // 将 tag 中的非法字符转为下划线，保证镜像名合法
                        const safeTag = tag.replace(/[^a-zA-Z0-9_.-]/g, '_');
                        return `${CONTAINER_REGISTRY}/${containerName}:${imageBase}-${safeTag}`;
                    }
                });

                // 复制并给出反馈
                const copy = (text) => {
                    if (!text) return;
                    navigator.clipboard.writeText(text).then(() => {
                        copied.value = true;
                        setTimeout(() => copied.value = false, 2000);
                    });
                };

                return { fullImage, toImage, copy, copied };
            }
        }).mount('#app');</script></body></html><p></p></div></div><hr class="layui-border-orange"></div></div><style>.layui-content table{border-collapse:collapse;border-spacing:0;margin:10px 0;display:table}.layui-content table td,table th{padding:10px;border:1px solid #ddd;color:#333;vertical-align:middle;word-break:normal!important}.layui-content table .gutter{display:none}.layui-content figure.highlight{margin:15px 0;background:#e3e3e3;padding:0;line-height:24px;overflow-x:auto}.layui-content figure.highlight table td{border:0}.layui-content blockquote{margin:15px 0;background:#e3e3e3;border-left:3px solid #5fb878;padding:10px 0 0 20px}.layui-content ol li{margin-bottom:10px;list-style:decimal;margin-left:10px}.layui-content ul li{margin-bottom:10px;list-style:inside;margin-left:10px}.layui-content code{background-color:#e3e3e3}.layui-content a{text-decoration:underline;color:#1e9fff}body img{max-width:100%}</style></div></div><div class="footer"><p><span>Powered by <a href="https://hexo.io/" target="_blank">Hexo</a> </span><span>| </span><span>Theme - <a href="https://github.com/chihqiang/hexo-theme-xianxin" target="_blank">xianxin</a></span></p><p><span>&copy; 2025</span> <span>MIT license</span></p><script async src="https://www.googletagmanager.com/gtag/js?id=G-TBH6G20B8Y"></script><script>function gtag(){dataLayer.push(arguments)}window.dataLayer=window.dataLayer||[],gtag("js",new Date),gtag("config","G-TBH6G20B8Y")</script></div></body></html>
