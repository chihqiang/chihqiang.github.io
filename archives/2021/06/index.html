<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Archives xianxin 志强网</title><meta name="keywords" content="草根创业者,个人站长,站长动态,王志强,志强博客,志强网"><meta name="description" content="志强博客"><link rel="shortcut icon" type="image/x-icon" href="/img/favicon.ico"><link rel="stylesheet" href="/css/blog.css"><link rel="stylesheet" href="/libs/layui/css/layui.css"><script src="/libs/layui/layui.js"></script><script src="/js/blog.js"></script><meta name="generator" content="Hexo 7.3.0"></head><body class="lay-blog"><div class="header"><div class="header-wrap"><h1 class="logo pull-left"><a href="/"><img src="/img/logo.png" alt="" class="logo-img"> <img src="/img/logo-text.png" alt="" class="logo-text"></a></h1><style>#search-results{position:absolute;top:50px;left:0;width:100%;max-height:400px;overflow-y:auto;z-index:999;padding:10px}.search-result-item{background:#fff;border-radius:8px;padding:12px 16px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.08);transition:.2s ease;border:1px solid #eee}.search-result-item:hover{background-color:#f8f8f8;transform:translateY(-2px)}.search-result-title{font-size:16px;font-weight:600;color:#0078f2;text-decoration:none;display:block;line-height:1.5}.search-no-result{padding:16px;color:#999;font-style:italic}</style><div class="layui-form blog-seach pull-left" style="position:relative"><div class="layui-form-item blog-sewrap"><div class="layui-input-block blog-sebox"><i class="layui-icon layui-icon-search"></i> <input type="text" id="search-input" placeholder="请输入关键词" autocomplete="off" class="layui-input"><div id="search-results"></div></div></div></div><script>(() => {
    const input = document.getElementById('search-input');
    const resultBox = document.getElementById('search-results');
    let searchData = [];

    fetch('/search.json')
      .then(res => res.json())
      .then(data => searchData = data)
      .catch(err => console.error('加载 search.json 失败', err));

    input.addEventListener('input', () => {
      const keyword = input.value.trim().toLowerCase();
      resultBox.innerHTML = '';

      if (!keyword) return;

      const results = searchData.filter(post =>
        post.title.toLowerCase().includes(keyword)
      );

      if (results.length === 0) {
        resultBox.innerHTML = '<div class="search-no-result">没有找到相关文章</div>';
        return;
      }

      results.slice(0, 10).forEach(post => {
        const item = document.createElement('div');
        item.className = 'search-result-item';
        item.innerHTML = `
          <a href="${post.url}" class="search-result-title">${post.title}</a>
        `;
        resultBox.appendChild(item);
      });
    });

    // 点击页面其他地方关闭结果
    document.addEventListener('click', (e) => {
      if (!document.querySelector('.blog-seach').contains(e.target)) {
        resultBox.innerHTML = '';
      }
    });
  })();</script><div class="blog-nav pull-right"><ul class="layui-nav pull-left"><li class="layui-nav-item"><a href="/">Home</a></li><li class="layui-nav-item"><a href="/about">About</a></li><li class="layui-nav-item"><a href="/archives">Archives</a></li><li class="layui-nav-item"><a href="/tags">Tags</a></li><li class="layui-nav-item"><a href="/sitemap.xml">RSS</a></li></ul></div></div></div><div class="container-wrap"><div class="container"><div class="contar-wrap"><div class="layui-timeline"><div class="layui-timeline-item"><i class="layui-icon layui-timeline-axis"></i><div class="layui-timeline-content layui-text"><h3 class="layui-timeline-title"><a href="/archives/2021/06" title="2021&#x2F;06">2021&#x2F;06</a></h3></div><div class="layui-timeline-item"><div class="layui-timeline-content layui-text"><p><a href="/2021/06/18/php/easyswoole-websockey/">easyswoole实现websocket</a></p></div></div></div><div><center></center></div></div></div></div></div><div class="footer"><p><span>Powered by <a href="https://hexo.io/" target="_blank">Hexo</a> </span><span>| </span><span>Theme - <a href="https://github.com/chihqiang/hexo-theme-xianxin" target="_blank">xianxin</a></span></p><p><span>&copy; 2025</span> <span>MIT license</span></p><script async src="https://www.googletagmanager.com/gtag/js?id=G-TBH6G20B8Y"></script><script>function gtag(){dataLayer.push(arguments)}window.dataLayer=window.dataLayer||[],gtag("js",new Date),gtag("config","G-TBH6G20B8Y")</script></div></body></html>
